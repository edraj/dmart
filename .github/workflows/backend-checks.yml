name: Backend checks

on:
  push:
    branches: [ "main" ]
    paths: ["backend/**"]
  pull_request:
    branches: [ "main" ]
    paths: ["backend/**"]

permissions:
  contents: read

jobs:
  build:

    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Fetch all history and tags for git describe
    - name: Install python dependencies
      run: |
        source $HOME/.venv/bin/activate
        cd backend; 
        uv pip install -r requirements/core.txt  -r requirements/extra.txt  -r requirements/plugins.txt  -r requirements/test.txt
        mkdir logs/
        cp ~/login_creds.sh ./
        cp ~/config.env ./
    - name: Lint with pyright, Ruff and Mypy
      run: |
        cd backend
        source $HOME/.venv/bin/activate
        ./pylint.sh
    - name: Test with pytest
      run: |
        systemctl --user stop dmart
        source $HOME/.venv/bin/activate
        cd backend; export PYTHONPATH="."; pytest
