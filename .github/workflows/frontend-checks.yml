name: CXB checks

on:
  push:
    branches: [ "main" ]
    paths: ["cxb/**"]
  pull_request:
    branches: [ "main" ]
    paths: ["cxb/**"]

permissions:
  contents: read

jobs:
  build:

    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Fetch all history and tags for git describe
    - name: Install cxb js depdenencies
      run: |
        cd cxb
        yarn install
    - name: Build CXB 
      run: |
        cd cxb
        cp public/config.sample.json public/config.json
        yarn build
    - name: Check svelte
      run: |
        cd cxb
        yarn svelte-check
