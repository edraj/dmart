name: CXB checks

on:
  push:
    branches: [ "master" ]
    paths: ["cxb/**"]
  pull_request:
    branches: [ "master" ]
    paths: ["cxb/**"]

permissions:
  contents: read

jobs:
  build:

    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4
    - name: Install cxb js depdenencies
      run: |
        cd cxb
        rm .yarnrc
        yarn install
    - name: Build CXB 
      run: |
        cd cxb
        yarn build
    - name: Check svelte
      run: |
        cd cxb
        yarn svelte-check
